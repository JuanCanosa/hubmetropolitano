name: Deploy

on:
  push:
    branches:
      - main
  repository_dispatch:
    types:
      - wordpress_publish

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Install rsync
        run: sudo apt-get install -y rsync

      - name: Deploy dist to VPS
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            dist/ package.json package-lock.json \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/hubmetropolitano/frontend/

      - name: Install production deps and restart Astro
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ENDSSH'
          docker run --rm \
            -v /opt/hubmetropolitano/frontend:/app \
            -w /app \
            node:22-alpine \
            npm ci --omit=dev
          cd /opt/hubmetropolitano
          docker compose restart astro
          ENDSSH
